<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      font-family: "DejaVu Sans", Arial, sans-serif;
      font-size: 10px;
      color: #374151;
    }
    .hdr {
      width: 100%;
      border-bottom: 1px solid #d1d5db;
      padding: 2px 6px 3px;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: center;
      white-space: nowrap;
    }
    .left { font-weight: 600; }
    .right { font-weight: 500; }
  </style>
</head>
<body>
  <div id="hdr" class="hdr">
    <div class="left">Institut Supérieur d'Informatique</div>
    <div class="right">CHAANBI Talel</div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var page = parseInt(params.get('page') || '1', 10);
      if (page === 1) {
        var hdr = document.getElementById('hdr');
        if (hdr) hdr.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
